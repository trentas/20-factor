# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: The 20-Factor App
description: >
  A methodology for building cloud-native AI applications —
  extending the original 12-Factor App for LLMs, agents, and AI-native systems.
footer_text: >
  Licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>.
  Contributions welcome on <a href="https://github.com/trentas/18-factor">GitHub</a>.

keywords: ai, llm, agents, cloud-native, 12-factor, methodology, software-architecture
lang: en
icon: 🤖

url: https://trentas.github.io
baseurl: /18-factor

last_updated: false
back_to_top: true

include: ["_pages"]

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

remote_theme: alshedivat/al-folio@master

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
search_enabled: true
socials_in_search: false
bib_search: false
max_width: 960px

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------

enable_darkmode: true
enable_math: false
enable_tooltips: false
enable_navbar_social: false
enable_project_categories: true
enable_medium_zoom: false
enable_progressbar: true
enable_video_embedding: false

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  projects:
    output: true
    permalink: /factors/:path/
  news:
    output: false
    permalink: /news/:path/

# Disable optional al-folio features we don't need
announcements:
  enabled: false

latest_posts:
  enabled: false

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

permalink: pretty

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# -----------------------------------------------------------------------------
# Exclude from Jekyll processing
# -----------------------------------------------------------------------------

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .claude/
  - node_modules/
  - "*.gemspec"
  - README.md
  - MAPPING.md
  - docs/
